<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claw Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0f0c29;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-family: system-ui, sans-serif;
  color: #fff;
  gap: 16px;
}

h1 {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #aaa;
}

.hud {
  display: flex;
  gap: 40px;
}
.hud-block { text-align: center; }
.hud-label { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
.hud-val { font-size: 24px; font-weight: 700; color: #ffd700; font-variant-numeric: tabular-nums; }

.machine {
  position: relative;
  width: 340px;
}

/* Glass box */
.glass {
  background: rgba(255,255,255,0.04);
  border: 2px solid rgba(255,255,255,0.12);
  border-radius: 12px 12px 4px 4px;
  height: 320px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(100,180,255,0.08) inset, 0 20px 60px rgba(0,0,0,0.5);
}

/* Vertical guide rail */
.glass::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 2px;
  height: 100%;
  background: rgba(255,255,255,0.04);
}

/* Drop chute at bottom-right */
.chute {
  position: absolute;
  bottom: 0; right: 0;
  width: 72px;
  height: 60px;
  border-left: 2px solid rgba(255,255,255,0.15);
  border-top: 2px solid rgba(255,255,255,0.15);
  border-radius: 8px 0 0 0;
  background: rgba(0,0,0,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #666;
  letter-spacing: 1px;
}

/* Base */
.base {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,255,255,0.1);
  border-top: none;
  border-radius: 0 0 12px 12px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
}

canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

.controls {
  display: flex;
  gap: 12px;
  align-items: center;
}

button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  color: #fff;
  font-size: 13px;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  user-select: none;
}
button:hover { background: rgba(255,255,255,0.14); }
button:active { transform: scale(0.96); }

#dropBtn {
  background: linear-gradient(135deg, #e94560, #c0392b);
  border-color: transparent;
  padding: 10px 28px;
}
#dropBtn:hover { filter: brightness(1.1); }
#dropBtn:disabled { opacity: 0.4; cursor: default; transform: none; filter: none; }

.msg {
  font-size: 13px;
  color: #ffd700;
  height: 20px;
  text-align: center;
  letter-spacing: 0.5px;
}
</style>
</head>
<body>

<h1>Claw Machine</h1>

<div class="hud">
  <div class="hud-block">
    <div class="hud-label">Score</div>
    <div class="hud-val" id="scoreVal">0</div>
  </div>
  <div class="hud-block">
    <div class="hud-label">Plays</div>
    <div class="hud-val" id="playsVal">5</div>
  </div>
</div>

<div class="machine">
  <div class="glass">
    <canvas id="c" width="340" height="320"></canvas>
    <div class="chute">DROP</div>
  </div>
  <div class="base">
    <span style="font-size:11px;color:#555;letter-spacing:1px;">INSERT COIN</span>
  </div>
</div>

<div class="controls">
  <button id="leftBtn">◀</button>
  <button id="dropBtn">GRAB</button>
  <button id="rightBtn">▶</button>
</div>

<div class="msg" id="msg"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 340, H = 320;
const CHUTE_X = W - 72; // x where chute starts

// ── State ─────────────────────────────────────────────────────────────────────
let score = 0, plays = 5;
let phase = 'idle'; // idle | moving | dropping | rising | done
let clawX = W / 2;
let clawY = 36; // top resting position
let clawOpen = true;
let grabbed = null;
let msg = '';

const CLAW_SPEED = 3;
const DROP_SPEED = 4;
const RISE_SPEED = 5;
const CLAW_REST_Y = 36;
const CLAW_MAX_Y = H - 80;

// Prizes: {x, y, color, emoji, points, grabbed}
const PRIZES = [];
const EMOJIS = ['🧸', '⭐', '🍬', '🎀', '🐻', '💎', '🦄', '🍭'];
const POINTS = [10, 20, 10, 15, 25, 50, 30, 15];

function initPrizes() {
  PRIZES.length = 0;
  const cols = 4, rows = 3;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = Math.floor(Math.random() * EMOJIS.length);
      PRIZES.push({
        x: 40 + c * 70 + Math.random() * 20 - 10,
        y: H - 90 - r * 65 + Math.random() * 15,
        emoji: EMOJIS[idx],
        points: POINTS[idx],
        fallen: false,
      });
    }
  }
}

initPrizes();

// ── Key / button handling ──────────────────────────────────────────────────────
const keys = { left: false, right: false };

document.getElementById('leftBtn').addEventListener('mousedown', () => keys.left = true);
document.getElementById('rightBtn').addEventListener('mousedown', () => keys.right = true);
['mouseup','mouseleave'].forEach(e => {
  document.getElementById('leftBtn').addEventListener(e, () => keys.left = false);
  document.getElementById('rightBtn').addEventListener(e, () => keys.right = false);
});

// Touch support
document.getElementById('leftBtn').addEventListener('touchstart', e => { e.preventDefault(); keys.left = true; }, {passive:false});
document.getElementById('rightBtn').addEventListener('touchstart', e => { e.preventDefault(); keys.right = true; }, {passive:false});
document.getElementById('leftBtn').addEventListener('touchend', () => keys.left = false);
document.getElementById('rightBtn').addEventListener('touchend', () => keys.right = false);

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  keys.left  = true;
  if (e.key === 'ArrowRight') keys.right = true;
  if ((e.key === ' ' || e.key === 'ArrowDown') && phase === 'idle') drop();
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft')  keys.left  = false;
  if (e.key === 'ArrowRight') keys.right = false;
});

document.getElementById('dropBtn').addEventListener('click', drop);

function drop() {
  if (phase !== 'idle' || plays <= 0) return;
  plays--;
  updateHUD();
  phase = 'dropping';
  clawOpen = true;
  grabbed = null;
  setMsg('');
}

// ── Update ─────────────────────────────────────────────────────────────────────
function update() {
  if (phase === 'idle') {
    if (keys.left)  clawX = Math.max(20, clawX - CLAW_SPEED);
    if (keys.right) clawX = Math.min(W - 20, clawX + CLAW_SPEED);
  }

  if (phase === 'dropping') {
    clawY += DROP_SPEED;
    if (clawY >= CLAW_MAX_Y) {
      clawY = CLAW_MAX_Y;
      clawOpen = false;
      tryGrab();
      phase = 'rising';
    }
  }

  if (phase === 'rising') {
    clawY -= RISE_SPEED;
    if (grabbed) grabbed.x = clawX, grabbed.y = clawY + 28;
    if (clawY <= CLAW_REST_Y) {
      clawY = CLAW_REST_Y;
      phase = 'delivering';
    }
  }

  if (phase === 'delivering') {
    // move claw to chute
    const target = CHUTE_X + 20;
    const dx = target - clawX;
    if (Math.abs(dx) > CLAW_SPEED) {
      clawX += Math.sign(dx) * CLAW_SPEED;
      if (grabbed) grabbed.x = clawX, grabbed.y = clawY + 28;
    } else {
      clawX = target;
      if (grabbed) {
        score += grabbed.points;
        setMsg(`+${grabbed.points} pts! ${grabbed.emoji}`);
        grabbed.fallen = true;
        grabbed = null;
      } else {
        setMsg('So close! Try again.');
      }
      clawOpen = true;
      phase = 'returning';
    }
  }

  if (phase === 'returning') {
    // return claw to center
    const target = W / 2;
    const dx = target - clawX;
    if (Math.abs(dx) > CLAW_SPEED) {
      clawX += Math.sign(dx) * CLAW_SPEED;
    } else {
      clawX = target;
      phase = plays > 0 ? 'idle' : 'done';
      if (phase === 'done') setMsg('Game over! Refresh to play again.');
    }
  }

  updateHUD();
}

function tryGrab() {
  // find closest prize within grab radius
  let best = null, bestDist = 36;
  for (const p of PRIZES) {
    if (p.fallen) continue;
    const dx = p.x - clawX, dy = p.y - clawY;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < bestDist) { bestDist = d; best = p; }
  }
  // 70% success rate when close enough
  if (best && Math.random() < 0.70) {
    grabbed = best;
  }
}

// ── Draw ───────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Draw prizes
  for (const p of PRIZES) {
    if (p.fallen || p === grabbed) continue;
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,255,255,0.2)';
    ctx.shadowBlur = 8;
    ctx.fillText(p.emoji, p.x, p.y);
    ctx.shadowBlur = 0;
  }

  // Draw grabbed prize (attached to claw)
  if (grabbed) {
    ctx.font = '28px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(grabbed.emoji, grabbed.x, grabbed.y);
  }

  // Claw wire
  ctx.strokeStyle = 'rgba(200,220,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(clawX, 0);
  ctx.lineTo(clawX, clawY - 2);
  ctx.stroke();

  // Claw body
  drawClaw(clawX, clawY, clawOpen);
}

function drawClaw(x, y, open) {
  const spread = open ? 18 : 8;
  const len = 22;
  ctx.strokeStyle = '#c0d8ff';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';

  // Center hub
  ctx.beginPath();
  ctx.arc(x, y, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#c0d8ff';
  ctx.fill();

  // Left arm
  ctx.beginPath();
  ctx.moveTo(x - 2, y + 4);
  ctx.quadraticCurveTo(x - spread, y + len * 0.5, x - spread + 4, y + len);
  ctx.stroke();

  // Center arm
  ctx.beginPath();
  ctx.moveTo(x, y + 6);
  ctx.lineTo(x, y + len);
  ctx.stroke();

  // Right arm
  ctx.beginPath();
  ctx.moveTo(x + 2, y + 4);
  ctx.quadraticCurveTo(x + spread, y + len * 0.5, x + spread - 4, y + len);
  ctx.stroke();
}

// ── HUD ────────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('playsVal').textContent = plays;
  document.getElementById('dropBtn').disabled = phase !== 'idle' || plays <= 0;
}

function setMsg(text) {
  msg = text;
  document.getElementById('msg').textContent = text;
}

// ── Loop ───────────────────────────────────────────────────────────────────────
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

updateHUD();
loop();
</script>
</body>
</html>
